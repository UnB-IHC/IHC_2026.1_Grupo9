site_name: Plugin de Acessibilidade - IHC
site_description: Documentação do projeto de Interação Humano-Computador - Grupo 09.
site_author: Grupo 09

repo_url: https://github.com/Gotc2607/IHC_Plugin-Acessibilidade
repo_name: IHC_Plugin-Acessibilidade

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro

markdown_extensions:
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: false
      clickable_checkbox: true

nav:
  - Início: index.md
  - Design: design.md
  - Desenvolvimento Web: desenvolvimento.md
  - Geração de Conteúdo: conteudo.md
  - Gestão de Projetos: gestao.md
  - Ferramentas: ferramentas.md
  - Heurísticas de Nielsen: heuristicas.md