<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; width: 480px; padding: 15px; margin: 0; color: #333; }
    h2 { font-size: 16px; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    
    .checklist-container { max-height: 400px; overflow-y: auto; margin-bottom: 10px; padding-right: 5px; }
    
    .check-item { background: #fdfdfd; border: 1px solid #eee; border-radius: 4px; padding: 10px; margin-bottom: 12px; }
    .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
    .item-header label { font-size: 13px; font-weight: bold; width: 70%; line-height: 1.3; }
    .item-header select { font-size: 12px; padding: 3px; border: 1px solid #ccc; border-radius: 3px; margin-left: 10px; }
    
    .item-dica { font-size: 11px; color: #666; font-style: italic; margin-bottom: 8px; line-height: 1.4; display: block; }
    
    .check-item input[type="text"] { width: 100%; box-sizing: border-box; padding: 6px; font-size: 12px; border: 1px solid #ddd; border-radius: 3px; }
    
    .insights-box { background: #f0f7ff; border: 1px solid #cce5ff; border-radius: 4px; padding: 10px; font-size: 12px; margin-bottom: 12px; white-space: pre-wrap; color: #004085; line-height: 1.4;}
    .insights-box strong { display: block; margin-bottom: 5px;}

    button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
    button:hover { background: #004494; }
  </style>
</head>
<body>
  <h2>Auditoria Heurística Detalhada</h2>
  
  <div class="insights-box">
    <strong>🤖 Dados Automáticos da Página:</strong>
    <span id="auto-feedback">Analisando a aba atual...</span>
  </div>

  <div class="checklist-container">
    <div id="dynamic-heuristics"></div>
  </div>

  <button id="gerar-txt">Gerar Relatório Detalhado (.txt)</button>

  <script src="popup.js"></script>
</body>
</html>
